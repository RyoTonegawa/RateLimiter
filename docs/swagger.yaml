basePath: /
definitions:
  api.Response:
    properties:
      algorithm:
        example: token_bucket
        type: string
      allowed:
        example: true
        type: boolean
      message:
        example: request accepted
        type: string
    type: object
info:
  contact: {}
  description: |-
    5種類の代表的なレートリミッターを、それぞれ別のGinエンドポイントとして公開する学習用APIです。
    システムデザイン面接では、バースト耐性、メモリ使用量、境界時刻の問題、分散環境での一貫性を比較して説明できることが重要です。
  title: レートリミッター学習API
  version: "1.0"
paths:
  /fixed-window-counter:
    get:
      description: |-
        固定長の時間窓ごとにリクエスト数をカウントします。
        Pros: 実装が非常にシンプルで、キーごとにカウンターを1つ持てばよいため低コストです。Redis INCR + TTLでも実装しやすいです。
        Cons: 窓の終端と次の窓の開始直後に連続で送ると、短時間で最大2窓分のリクエストを許してしまいます。境界バーストが代表的な弱点です。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.Response'
      summary: Fixed Window Counter方式のレートリミット
      tags:
      - rate-limiters
  /leaking-bucket:
    get:
      description: |-
        バケットをキューのように扱い、一定速度で漏れ出す前提でリクエストを受け付けます。
        Pros: 下流への流量を平滑化しやすく、急なスパイクを一定速度に近づけられます。
        Cons: キューが大きいと遅延を隠してしまい、小さいとすぐ拒否します。このサンプルでは内部workerが固定間隔でキューをdrainしますが、実運用では永続化Queue、retry、timeout、バックプレッシャー設計も論点になります。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.Response'
      summary: Leaking Bucket方式のレートリミット
      tags:
      - rate-limiters
  /sliding-window-counter:
    get:
      description: |-
        現在の固定窓カウントと、前の固定窓カウントに時間割合の重みを掛けた値で、ローリングウィンドウを近似します。
        Pros: Sliding Window Logよりメモリ効率が良く、キーごとに現在窓と前窓のカウンターだけで済みます。Fixed Windowより境界バーストを抑えやすいです。
        Cons: あくまで近似のため、前窓のリクエスト分布によっては正確なLog方式より厳しく拒否したり、逆に緩く許可したりする可能性があります。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.Response'
      summary: Sliding Window Counter方式のレートリミット
      tags:
      - rate-limiters
  /sliding-window-log:
    get:
      description: |-
        リクエスト時刻をログとして保持し、現在時刻から見た直近ウィンドウ内の件数を正確に数えます。
        Pros: 固定窓の境界問題を避けられ、ローリングウィンドウとして最も正確に制限できます。
        Cons: 許可したリクエストのタイムスタンプを保持するため、トラフィック量やキー数が多いとメモリ使用量が増えます。分散環境ではRedis Sorted Setなどでtrim/count/addを原子的に扱う必要があります。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.Response'
      summary: Sliding Window Log方式のレートリミット
      tags:
      - rate-limiters
  /token-bucket:
    get:
      description: |-
        トークンを一定速度で補充し、リクエストごとに1トークンを消費します。
        Pros: 平均レートを守りながら、バケット容量までの瞬間的なバーストを許可できます。API Gatewayやユーザー単位の制限でよく使われます。
        Cons: 容量分のバーストは下流サービスにそのまま流れるため、瞬間負荷に弱い下流では注意が必要です。分散環境ではトークン数と最終補充時刻を原子的に更新する必要があります。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.Response'
      summary: Token Bucket方式のレートリミット
      tags:
      - rate-limiters
swagger: "2.0"
